<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamMonitor — Login</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
                         'Microsoft YaHei', sans-serif;
            background: #06060f;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255,255,255,0.025);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 48px 40px 40px;
            width: 380px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        .login-title {
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
        }
        .login-sub {
            font-size: 13px;
            color: #64748b;
            text-align: center;
            margin-bottom: 32px;
        }
        .login-field {
            margin-bottom: 20px;
        }
        .login-field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 6px;
        }
        .login-field input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: #f1f5f9;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .login-field input:focus {
            border-color: rgba(34,211,238,0.4);
        }
        .login-error {
            color: #fb7185;
            font-size: 13px;
            text-align: center;
            margin-bottom: 16px;
            padding: 10px;
            background: rgba(251,113,133,0.08);
            border-radius: 8px;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            font-family: inherit;
        }
        .login-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-title">StreamMonitor</div>
        <div class="login-sub">请输入用户名和密码</div>
        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="login-field">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" autocomplete="username" required autofocus>
            </div>
            <div class="login-field">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="login-btn">登录</button>
        </form>
    </div>
</body>
</html>
